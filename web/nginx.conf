server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA routing — send unknown paths to index.html so React Router handles them
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the FastAPI container.
    # In Docker Compose the API service is named "api" — Docker DNS resolves it.
    location /macro/ {
        proxy_pass http://api:8090/macro/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /markets/ {
        proxy_pass http://api:8090/markets/;
        proxy_set_header Host $host;
    }

    location /pipeline/ {
        proxy_pass http://api:8090/pipeline/;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://api:8090/health;
    }

    # Cache static assets aggressively — Vite content-hashes filenames
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
