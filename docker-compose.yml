services:

  # ── ClickHouse — time-series storage ──────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"   # HTTP interface (clickhouse-connect uses this)
      - "9001:9000"   # Native protocol (mapped to 9001 to avoid system conflicts)
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: indiafindata
      CLICKHOUSE_USER: default
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL — pipeline metadata ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: indiafindata
      POSTGRES_USER: findata
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-findata_dev}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U findata -d indiafindata"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI + APScheduler — pipeline + query API ──────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    env_file: .env
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_DB: indiafindata
      POSTGRES_DSN: postgresql://findata:${POSTGRES_PASSWORD:-findata_dev}@postgres:5432/indiafindata
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      TZ: Asia/Kolkata
    depends_on:
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3

  # ── React dashboard — served by nginx ─────────────────────────────────────
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5190:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  # ── Prometheus — metrics scraping ─────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9091:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'

  # ── Grafana — dashboards ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3200:3000"
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer

volumes:
  clickhouse-data:
  postgres-data:
  prometheus-data:
  grafana-data:
